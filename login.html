<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css">
    <title>Login</title>
</head>
<body>
    <div id="from">
        <form action="">
            <h2 class="title">login</h2>            
            <label for="email">Email</label>
            <div class="input">
                <input id="email" name="email" placeholder="seu Email" type="text">
            </div>
            <label for="senha">Senha</label>
            <div class="input">
                <input id="senha" name="senha" placeholder="sua senha" type="password">

            <div id="btn">
                <button type="submit">cadastrar</button>
            </div>
        </form>
    </div>
</body>
</html>
